// FEATURE 4: REPORTS & REVENUE DASHBOARD
// ============================================================
function renderReports(){
  const now = new Date();
  const paidInvs = APP.invoices.filter(i => i.status === 'paid');
  const allJobs = APP.jobs;

  // Monthly revenue (last 6 months)
  const months = [];
  for(let i = 5; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const label = d.toLocaleDateString('en-US', {month: 'short'});
    const yr = d.getFullYear(), mo = d.getMonth();
    const rev = paidInvs.filter(inv => {
      const id = new Date(inv.paidDate || inv.createdAt);
      return id.getMonth() === mo && id.getFullYear() === yr;
    }).reduce((s, inv) => s + (inv.paidAmount || inv.total || 0), 0);
    months.push({label, rev});
  }
  const maxRev = Math.max(...months.map(m => m.rev), 1);

  // KPIs
  const totalRevenue = paidInvs.reduce((s, i) => s + (i.paidAmount || i.total || 0), 0);
  const thisMonthRev = months[months.length - 1].rev;
  const lastMonthRev = months[months.length - 2].rev;
  const avgJobValue = paidInvs.length > 0 ? totalRevenue / paidInvs.length : 0;
  const completedJobs = allJobs.filter(j => j.status === 'completed').length;
  const estimates = allJobs.filter(j => j.status === 'estimate').length;
  const closeRate = (completedJobs + estimates) > 0 ? Math.round((completedJobs / (completedJobs + estimates)) * 100) : 0;
  const pendingTotal = APP.invoices.filter(i => i.status === 'sent' || i.status === 'draft').reduce((s, i) => s + (i.total || 0), 0);
  const overdueInvs = APP.invoices.filter(i => (i.status === 'sent' || i.status === 'overdue') && i.dueDate && i.dueDate < today());

  // Revenue by job type
  const byType = {};
  paidInvs.forEach(inv => {
    const job = getJob(inv.jobId);
    const type = job ? job.jobType : 'Other';
    byType[type] = (byType[type] || 0) + (inv.paidAmount || inv.total || 0);
  });
  const typeEntries = Object.entries(byType).sort((a, b) => b[1] - a[1]);
  const typeColors = ['#FF6B35','#3b82f6','#22c55e','#8b5cf6','#14b8a6','#eab308','#ef4444','#6b7280'];

  let html = '<div class="page-header"><h2>Reports</h2></div>';

  // KPI cards
  html += '<div class="report-grid">';
  html += `<div class="report-card"><div class="rv">${fmtMoney(thisMonthRev)}</div><div class="rl">Revenue This Month</div>
    ${lastMonthRev > 0 ? `<div style="margin-top:8px;font-size:.82rem;color:${thisMonthRev >= lastMonthRev ? 'var(--green)' : 'var(--red)'};">${thisMonthRev >= lastMonthRev ? '&#9650;' : '&#9660;'} ${Math.abs(Math.round(((thisMonthRev - lastMonthRev) / lastMonthRev) * 100))}% vs last month</div>` : ''}
  </div>`;
  html += `<div class="report-card"><div class="rv">${fmtMoney(totalRevenue)}</div><div class="rl">All-Time Revenue</div></div>`;
  html += `<div class="report-card"><div class="rv">${fmtMoney(avgJobValue)}</div><div class="rl">Avg Invoice Value</div></div>`;
  html += `<div class="report-card"><div class="rv">${closeRate}%</div><div class="rl">Close Rate</div>
    <div style="margin-top:8px;font-size:.82rem;color:var(--gray)">${completedJobs} completed / ${completedJobs + estimates} total</div></div>`;
  html += `<div class="report-card"><div class="rv">${fmtMoney(pendingTotal)}</div><div class="rl">Outstanding Invoices</div>
    ${overdueInvs.length > 0 ? `<div style="margin-top:8px;font-size:.82rem;color:var(--red)">&#9888; ${overdueInvs.length} overdue</div>` : ''}
  </div>`;
  html += `<div class="report-card"><div class="rv">${allJobs.length}</div><div class="rl">Total Jobs</div>
    <div style="margin-top:8px;font-size:.82rem;color:var(--gray)">${allJobs.filter(j=>j.status!=='completed'&&j.status!=='estimate').length} active now</div></div>`;
  html += '</div>';

  // Monthly Revenue Chart
  html += '<div class="chart-container"><h3>&#128200; Monthly Revenue</h3>';
  html += '<div class="bar-chart">';
  months.forEach(m => {
    const pct = maxRev > 0 ? Math.max(4, (m.rev / maxRev) * 100) : 4;
    html += `<div class="bar" style="height:${pct}%;background:var(--orange)"><span class="bar-val">${m.rev > 0 ? fmtMoney(m.rev) : ''}</span></div>`;
  });
  html += '</div><div class="bar-labels">';
  months.forEach(m => { html += `<span>${m.label}</span>`; });
  html += '</div></div>';

  // Revenue by Job Type
  if(typeEntries.length > 0){
    html += '<div class="chart-container"><h3>&#128178; Revenue by Job Type</h3>';
    const typeMax = typeEntries[0][1];
    typeEntries.slice(0, 8).forEach(([type, val], i) => {
      const pct = Math.max(8, (val / typeMax) * 100);
      html += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:150px;font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(type)}</div>
        <div style="flex:1;background:#f3f4f6;border-radius:6px;height:28px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${typeColors[i % typeColors.length]};border-radius:6px;display:flex;align-items:center;padding-left:10px">
            <span style="font-size:.75rem;font-weight:700;color:#fff">${fmtMoney(val)}</span>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // Job Status Breakdown
  html += '<div class="chart-container"><h3>&#128295; Jobs by Status</h3><div style="display:flex;flex-wrap:wrap;gap:12px">';
  JOB_STATUSES.forEach(s => {
    const count = allJobs.filter(j => j.status === s.val).length;
    if(count > 0){
      html += `<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:#f8f9fa;border-radius:8px">
        <span class="pill ${s.cls}">${s.label}</span>
        <strong>${count}</strong>
      </div>`;
    }
  });
  html += '</div></div>';

  return html;
}

function addPhotos(jobId, files) {
  var job = getJob(jobId);
  if (!job || !files.length) return;
  if (!job.photos) job.photos = [];
  var zoneEl = document.getElementById('photoZone_'+jobId);
  var zone = zoneEl ? zoneEl.value : 'Misc';
  var loaded = 0;
  var total = files.length;
  Array.from(files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 800, maxH = 600;
        var w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        if (h > maxH) { w = w * maxH / h; h = maxH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        job.photos.push({ zone: zone, data: canvas.toDataURL('image/jpeg', 0.7), date: new Date().toISOString() });
        loaded++;
        if (loaded === total) {
          saveData();
          navigate('job-detail', jobId);
          showToast(loaded + ' photo(s) added');
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function deletePhoto(jobId, idx) {
  var job = getJob(jobId);
  if (!job || !job.photos) return;
  job.photos.splice(idx, 1);
  saveData();
  navigate('job-detail', jobId);
  showToast('Photo removed');
}

function addPart(jobId) {
  var job = getJob(jobId);
  if (!job) return;
  var name = document.getElementById('ap_name_'+jobId).value.trim();

  job.parts.push({
    name: name,
    type: document.getElementById('ap_type_'+jobId).value,
    supplier: document.getElementById('ap_supplier_'+jobId).value.trim(),
    cost: parseFloat(document.getElementById('ap_cost_'+jobId).value) || 0,
    partNumber: document.getElementById('ap_num_'+jobId).value.trim(),
    status: 'Ordered',
    addedAt: new Date().toISOString()
  });

  saveData();
  navigate('job-detail', jobId);
  showToast('Part added');
}

function updatePartStatus(jobId, idx, status) {

  showToast(job.parts[idx].name + ' → ' + status);

function deletePart(jobId, idx) {
  var job = getJob(jobId);
  if (!job || !job.parts) return;
  job.parts.splice(idx, 1);
  saveData();
  navigate('job-detail', jobId);
  showToast('Part removed');
}

// ── Technician Management ──
var TECH_ROLES = ['Body Tech','Painter','Estimator','Detailer','Frame Tech','PDR Tech','Apprentice'];

function renderTechnicians() {
  if (!APP.technicians) APP.technicians = [];
  var h = '<div class="page-header"><h2>&#128119; Technicians</h2><div class="page-header-actions"><button class="btn-primary" onclick="openTechModal()">+ Add Technician</button></div></div>';

  if (APP.technicians.length === 0) {
    h += '<div class="empty-state"><div class="empty-icon">&#128119;</div><p>No technicians yet. Add your team to start tracking.</p></div>';
    return h;
  }

  h += '<div class="tech-grid">';
  APP.technicians.forEach(function(tech) {
    var assigned = APP.jobs.filter(function(j){ return j.techId === tech.id && j.status !== 'completed' && j.status !== 'estimate'; });
    var completed = APP.jobs.filter(function(j){ return j.techId === tech.id && j.status === 'completed'; });
    var totalHours = assigned.reduce(function(s,j){ return s + (j.estimateHours || 0); }, 0);
    var maxHours = 40;
    var loadPct = Math.min(100, Math.round((totalHours / maxHours) * 100));
    var loadColor = loadPct > 90 ? '#ef4444' : loadPct > 70 ? '#eab308' : '#22c55e';
    var initials = tech.name.split(' ').map(function(w){ return w[0]; }).join('').toUpperCase();

    h += '<div class="tech-card">';
    h += '<div class="tech-avatar-lg">'+escHtml(initials)+'</div>';
    h += '<div class="tech-name">'+escHtml(tech.name)+'</div>';
    h += '<div class="tech-role">'+escHtml(tech.role || 'Technician')+'</div>';
    h += '<div class="workload-bar"><div class="wb-fill" style="width:'+loadPct+'%;background:'+loadColor+'"></div></div>';
    h += '<div style="font-size:.75rem;color:#6b7280;margin-top:4px">'+totalHours+'/'+maxHours+' hrs ('+loadPct+'%)</div>';
    h += '<div class="tech-stats"><div class="ts"><div class="tsv">'+assigned.length+'</div><div class="tsl">Active</div></div><div class="ts"><div class="tsv">'+completed.length+'</div><div class="tsl">Completed</div></div></div>';
    h += '<div style="margin-top:12px;display:flex;gap:6px;justify-content:center"><button class="btn-sm btn-outline" onclick="openTechModal(\''+tech.id+'\')">Edit</button><button class="btn-sm btn-danger" onclick="deleteTech(\''+tech.id+'\')" style="padding:0 10px">×</button></div>';
    h += '</div>';
  });
  h += '</div>';

  // Active assignments table
  var assignedJobs = APP.jobs.filter(function(j){ return j.techId && j.status !== 'completed' && j.status !== 'estimate'; });
  if (assignedJobs.length > 0) {
    h += '<div class="card" style="margin-top:20px"><div class="card-header"><h3>Active Assignments</h3></div>';
    h += '<div class="table-container"><table><thead><tr><th>Tech</th><th>Vehicle</th><th>Job</th><th>Status</th><th>Bay</th></tr></thead><tbody>';
    assignedJobs.forEach(function(j) {
      var tech = (APP.technicians||[]).find(function(t){ return t.id === j.techId; });
      var st = getJobStatus(j.status);
      var bay = (APP.bays||[]).find(function(b){ return b.id === j.bayId; });
      h += '<tr onclick="navigate(\'job-detail\',\''+j.id+'\')" style="cursor:pointer">';
      h += '<td><strong>'+escHtml(tech?tech.name:'—')+'</strong></td>';
      h += '<td>'+escHtml(j.vehicleMake || '—')+'</td>';
      h += '<td>'+escHtml(j.jobType)+'</td>';
      h += '<td><span class="pill '+st.cls+'">'+st.label+'</span></td>';
      h += '<td>'+escHtml(bay?bay.name:'—')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }
  return h;
}

function openTechModal(id) {
  var tech = id ? (APP.technicians||[]).find(function(t){ return t.id === id; }) : null;
  var roleOpts = TECH_ROLES.map(function(r){ return '<option'+(tech&&tech.role===r?' selected':'')+'>'+r+'</option>'; }).join('');
  openModal(
    '<div class="modal-header"><h3>'+(tech?'Edit':'Add')+' Technician</h3><button class="btn-icon" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
    '<div class="form-group"><label>Name *</label><input id="techName" value="'+(tech?escHtml(tech.name):'')+'"></div>'+
    '<div class="form-row"><div class="form-group"><label>Role</label><select id="techRole">'+roleOpts+'</select></div>'+
    '<div class="form-group"><label>Phone</label><input id="techPhone" value="'+(tech?escHtml(tech.phone||''):'')+'"></div></div>'+
    '<div class="form-group"><label>Hourly Rate ($)</label><input type="number" id="techRate" value="'+(tech?tech.rate||65:65)+'"></div>'+
    '</div><div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancel</button>'+
    '<button class="btn-primary" onclick="saveTech(\''+(id||'')+'\')">Save</button></div>'
  );
}

function saveTech(id) {
  var name = document.getElementById('techName').value.trim();
  if (!name) { showToast('Name required','error'); return; }
  if (!APP.technicians) APP.technicians = [];
  var data = {
    name: name,
    role: document.getElementById('techRole').value,
    phone: document.getElementById('techPhone').value.trim(),
    rate: parseFloat(document.getElementById('techRate').value) || 65
  };
  if (id) {
    var idx = -1;
    APP.technicians.forEach(function(t,i){ if(t.id===id) idx=i; });
    if (idx >= 0) { data.id = id; APP.technicians[idx] = data; }
  } else {
    data.id = 'tech_' + genId();
    APP.technicians.push(data);
  }
  saveData(); closeModal(); navigate('technicians');
  showToast(id ? 'Technician updated' : 'Technician added');
}

function deleteTech(id) {
  if (!confirm('Remove this technician?')) return;
  APP.technicians = (APP.technicians||[]).filter(function(t){ return t.id !== id; });
  saveData(); navigate('technicians');
  showToast('Technician removed');
}

function assignTechToJob(jobId, techId) {
  var job = getJob(jobId);
  if (!job) return;
  job.techId = techId || '';
  var tech = (APP.technicians||[]).find(function(t){ return t.id === techId; });
  if (tech) job.technician = tech.name;
  saveData();
  showToast(tech ? 'Assigned to ' + tech.name : 'Tech unassigned');
}

function assignBayToJob(jobId, bayId) {
  var job = getJob(jobId);
  if (!job) return;
  job.bayId = bayId || '';
  var bay = (APP.bays||[]).find(function(b){ return b.id === bayId; });
  saveData();
  showToast(bay ? 'Assigned to ' + bay.name : 'Bay unassigned');
}

async function init(){
  // Try load from server first, then localStorage, then sample data
  const serverLoaded = await loadFromServer();
  if(!serverLoaded){
    const localLoaded = loadData();
    if(!localLoaded || (!APP.clients.length && !APP.jobs.length)){
      generateSampleData();
    }
  }
  updateStatus(serverAvailable?'saved':'local', serverAvailable?'Connected':'Local only');

  // Hash routing
  const hash = window.location.hash.replace('#','') || 'dashboard';
  navigate(hash);
  window.addEventListener('hashchange', ()=>{
    const h = window.location.hash.replace('#','') || 'dashboard';
    if(['dashboard','pipeline','clients','jobs','invoices','reports','settings'].includes(h)){
      navigate(h);
    }
  });
}
